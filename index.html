<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Uriel Aguilar Torres</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #13181f;
      --surface2: #181e28;
      --border: #252d3a;
      --text: #f0f2f5;
      --muted: #7a8496;
      --accent: #c9a84c;
      --accent-dim: rgba(201,168,76,0.12);
      --accent2: #b0975a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Subtle radial glow behind card */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    /* Banner */
    .card-banner {
      width: 100%;
      height: 130px;
      object-fit: cover;
      object-position: center 60%;
      display: block;
      filter: brightness(0.65) saturate(0.6);
    }

    /* Gold rule under banner */
    .banner-rule {
      height: 3px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 60%, transparent 100%);
    }

    /* Identity block */
    .card-identity {
      padding: 0 28px 24px;
    }

    .headshot-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      overflow: hidden;
      margin-top: -48px;
      margin-bottom: 14px;
      background: var(--surface2);
      flex-shrink: 0;
    }
    .headshot-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 5px;
    }
    .card-name em {
      font-style: italic;
      font-weight: 300;
      color: var(--accent);
    }

    .card-title {
      font-size: 13px;
      color: var(--accent2);
      font-weight: 400;
      margin-bottom: 3px;
      line-height: 1.5;
    }

    .card-location {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 28px 20px;
    }

    /* Links */
    .card-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 28px 28px;
    }

    .card-link {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 13px 16px;
      text-decoration: none;
      color: var(--text);
      font-size: 13.5px;
      font-weight: 400;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .card-link:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .link-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .card-link:hover .link-icon {
      background: rgba(201,168,76,0.2);
    }
    .link-icon svg {
      width: 15px;
      height: 15px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .link-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .link-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .link-value {
      font-size: 13px;
      color: var(--text);
    }

    .link-arrow {
      margin-left: auto;
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }
    .card-link:hover .link-arrow {
      color: var(--accent);
      transform: translateX(2px);
    }

    /* Save contact button */
    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: calc(100% - 56px);
      margin: 0 28px 28px;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #0d1117;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-save:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-save svg { width: 14px; height: 14px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card          { animation: fadeUp 0.5s ease both; }
    .headshot-wrap { animation: fadeUp 0.5s ease 0.15s both; }
    .card-name     { animation: fadeUp 0.5s ease 0.2s both; }
    .card-title    { animation: fadeUp 0.5s ease 0.25s both; }
    .card-location { animation: fadeUp 0.5s ease 0.28s both; }
    .divider       { animation: fadeUp 0.5s ease 0.3s both; }
    .card-links    { animation: fadeUp 0.5s ease 0.35s both; }
    .btn-save      { animation: fadeUp 0.5s ease 0.42s both; }
  </style>
</head>
<body>

<div class="card">

  <!-- Banner -->
  <img class="card-banner" src="banner.jpg" alt=""/>
  <div class="banner-rule"></div>

  <!-- Identity -->
  <div class="card-identity">
    <div class="headshot-wrap">
      <img src="headshot.jpg" alt="Uriel Aguilar Torres"/>
    </div>
    <h1 class="card-name">Uriel <em>Aguilar Torres</em></h1>
    <p class="card-title">IT Systems Administrator · Beef Northwest Feeders</p>
    <p class="card-location">Portland, OR Metro &nbsp;·&nbsp; Oregon Tech '27</p>
  </div>

  <div class="divider"></div>

  <!-- Links -->
  <div class="card-links">

      <span class="link-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>

        <span class="link-label">Email</span>

    <a href="https://linkedin.com/in/urielagtor" target="_blank" class="card-link">
      <span class="link-icon">

        </svg>
      </span>
      <span class="link-text">
        <span class="link-label">LinkedIn</span>
        <span class="link-value">linkedin.com/in/urielagtor</span>
      </span>
      <svg class="link-arrow" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>

    <a href="/portfolio.html" class="card-link">
      <span class="link-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>

      <span class="link-text">

      <svg class="link-arrow" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  </div>

  <!-- View Portfolio -->
  <a href="/portfolio.html" download class="btn-save">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M3 9h18M9 21V9"/>
    </svg>

</div>

</body>
</html>
